site_name: Windhood-JZA — AI Agent Notes
site_description: Practical guides for running autonomous AI agents on a personal budget. Hermes Agent, Headroom compression, TradingView automation, content pipelines.
site_url: https://windhood-jza.github.io
site_author: Windhood-JZA
repo_url: https://github.com/windhood-jza/windhood-jza.github.io
repo_name: windhood-jza/windhood-jza.github.io

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - llmstxt:
      markdown_description: |
        Windhood-JZA's AI Agent Notes - practical guides for running
        autonomous AI agents on a personal budget.
      full_output: docs/llms-full.txt

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Posts:
      - Routing Hermes Through Headroom: posts/2026-06-22-headroom-hermes.md
  - About: about.md

docs_dir: docs
site_dir: site
use_directory_urls: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/windhood-jza
